<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK-SERVER REAL CONNECT V5</title>
    <style>
        :root { --neon: #00d2ff; --green: #00ff88; --red: #ff3366; --bg: #05070a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header with Live Sync Status */
        .header { background: #111; padding: 15px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .sync-status { color: var(--green); font-size: 11px; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .dot { height: 10px; width: 10px; background: var(--green); border-radius: 50%; box-shadow: 0 0 12px var(--green); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        /* Bridge Section (Replaces broken iframe) */
        .server-bridge { flex: 1.2; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; border-bottom: 1px solid #222; padding: 20px; }
        .bridge-msg { color: var(--neon); font-size: 12px; text-align: center; margin-bottom: 15px; }
        .btn-open-game { padding: 12px 25px; background: transparent; border: 1px solid var(--neon); color: var(--neon); border-radius: 50px; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        /* Real Connect Panel */
        .hack-panel { flex: 1.5; background: #0a0d14; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .sync-grid { display: flex; gap: 10px; }
        .sync-card { flex: 1; background: #000; border: 1px solid #1a1f2b; border-radius: 10px; padding: 12px; text-align: center; }
        .sync-card small { display: block; font-size: 9px; color: #555; margin-bottom: 5px; }
        .sync-val { font-size: 14px; color: var(--neon); font-weight: bold; letter-spacing: 1px; }

        .inject-display { 
            background: #000; border: 1px solid #1a1f2b; border-radius: 15px; 
            padding: 25px; text-align: center; box-shadow: inset 0 0 40px rgba(0, 210, 255, 0.05);
        }
        .res-text { font-size: 60px; font-weight: 900; letter-spacing: 8px; transition: 0.5s; }

        .btn-inject { 
            width: 100%; padding: 18px; background: var(--neon); color: #000; 
            border: none; border-radius: 10px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; font-size: 15px; box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
        }

        /* Result States */
        .big { color: var(--green); text-shadow: 0 0 30px var(--green); }
        .small { color: var(--red); text-shadow: 0 0 30px var(--red); }
        .syncing { color: #1a1f2b; animation: loading 0.6s infinite; }
        @keyframes loading { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="sync-status"><span class="dot"></span> REAL-TIME CONNECTED</div>
        <div style="font-size: 10px; color: #444;" id="liveClock">--:--:--</div>
    </div>

    <div class="server-bridge">
        <div class="bridge-msg">WIN GO 1MIN SERVER DETECTED</div>
        <button class="btn-open-game" onclick="window.open('https://www.cklottery.tv/#/home/AllLotteryGames/WinGo?id=1', '_blank')">OPEN REAL GAME WINDOW</button>
        <p style="font-size: 9px; color: #333; margin-top: 10px;">(After opening, hack tool will sync automatically)</p>
    </div>

    <div class="hack-panel">
        <div class="sync-grid">
            <div class="sync-card">
                <small>SERVER PERIOD</small>
                <div id="cPeriod" class="sync-val">---</div>
            </div>
            <div class="sync-card">
                <small>NEXT TARGET</small>
                <div id="nPeriod" class="sync-val" style="color: var(--green);">---</div>
            </div>
        </div>

        <div class="inject-display">
            <div style="font-size: 10px; color: #8b949e; margin-bottom: 15px; letter-spacing: 3px;">SERVER DATA INJECTED</div>
            <div id="resBox" class="res-text syncing">READY</div>
        </div>

        <button class="btn-inject" onclick="runRealInject()">INJECT SERVER DATA</button>
        <div style="text-align: center; font-size: 10px; color: #444;">ID: SYNC-PRO-V5 | ENCRYPTION: BYPASS ACTIVE</div>
    </div>

<script>
    // Real Connect Sync Logic (Website Timing နှင့် Period ကို အတိအကျညှိခြင်း)
    function bridgeConnect() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString();

        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        // CK Lottery Logic: နေ့စဉ်စုစုပေါင်းမိနစ်ကိုအခြေခံပြီး Period ID တွက်ခြင်း
        const totalMinutes = (now.getHours() * 60) + now.getMinutes();
        
        // Screenshot မှာပြထားတဲ့ "202604251000..." ပုံစံအတိုင်း Sync လုပ်ခြင်း
        const baseID = `${year}${month}${day}1000${1000 + totalMinutes}`;
        const targetID = `${year}${month}${day}1000${1001 + totalMinutes}`;

        document.getElementById('cPeriod').innerText = baseID;
        document.getElementById('nPeriod').innerText = targetID;
    }

    function runRealInject() {
        const resBox = document.getElementById('resBox');
        resBox.innerText = "CONNECTING";
        resBox.className = "res-text syncing";

        // Server API packet interception simulation
        setTimeout(() => {
            const results = ["BIG", "SMALL"];
            const finalResult = results[Math.floor(Math.random() * results.length)];
            
            resBox.innerText = finalResult;
            resBox.className = "res-text " + finalResult.toLowerCase();
            
            // Sync success log
            console.log(`[SYNC SUCCESS] Target: ${document.getElementById('nPeriod').innerText} Result: ${finalResult}`);
        }, 1500);
    }

    // စက္ကန့်မလပ် Sync လုပ်ပေးခြင်း
    setInterval(bridgeConnect, 1000);
    bridgeConnect();
</script>

</body>
</html>
