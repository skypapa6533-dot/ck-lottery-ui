<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK-SERVER REAL CONNECT V6</title>
    <style>
        :root { --neon: #00d2ff; --green: #00ff88; --red: #ff3366; --bg: #05070a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header & Online Status */
        .header { background: #111; padding: 12px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .live-label { color: var(--green); font-size: 11px; display: flex; align-items: center; gap: 6px; font-weight: bold; }
        .pulse { height: 8px; width: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        /* Web View Frame */
        .web-frame { flex: 1.5; background: #000; border-bottom: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Synchronized Control Panel */
        .control-panel { flex: 1; background: #0a0d14; padding: 15px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--neon); }
        
        .sync-row { display: flex; gap: 10px; }
        .sync-card { flex: 1; background: #000; border: 1px solid #1a1f2b; border-radius: 8px; padding: 10px; text-align: center; }
        .sync-card span { display: block; font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 5px; }
        .sync-val { font-size: 13px; color: var(--neon); font-weight: bold; letter-spacing: 1px; }

        /* Result Injection Display */
        .result-box { 
            background: #000; border: 1px solid #1a1f2b; border-radius: 12px; 
            padding: 20px; text-align: center; box-shadow: inset 0 0 30px rgba(0, 210, 255, 0.05);
        }
        .res-title { font-size: 10px; color: #8b949e; letter-spacing: 2px; margin-bottom: 8px; }
        .res-val { font-size: 52px; font-weight: 900; letter-spacing: 5px; }

        .btn-inject { 
            width: 100%; padding: 16px; background: var(--neon); color: #000; 
            border: none; border-radius: 8px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; font-size: 14px; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* Result Colors */
        .big { color: var(--green); text-shadow: 0 0 25px var(--green); }
        .small { color: var(--red); text-shadow: 0 0 25px var(--red); }
        .loading { color: #1a1f2b; animation: load 0.8s infinite; }
        @keyframes load { 50% { opacity: 0.1; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="live-label"><span class="pulse"></span> CK-SERVER CONNECTED</div>
        <div style="font-size: 12px; color: var(--neon); font-weight: bold;">WIN GO 1MIN INJECTOR</div>
        <div id="clock" style="font-size: 10px; color: #444;">00:00:00</div>
    </div>

    <div class="web-frame">
        <iframe id="ckGame" src="https://www.cklottery.tv/#/home/AllLotteryGames/WinGo?id=1"></iframe>
    </div>

    <div class="control-panel">
        <div class="sync-row">
            <div class="sync-card">
                <span>Current Period</span>
                <div id="currID" class="sync-val">---</div>
            </div>
            <div class="sync-card">
                <span>Upcoming Target</span>
                <div id="nextID" class="sync-val" style="color: var(--green);">---</div>
            </div>
        </div>

        <div class="result-box">
            <div class="res-title">SERVER DATA INJECTED</div>
            <div id="injectResult" class="res-val loading">READY</div>
        </div>

        <button class="btn-inject" onclick="runInjection()">INJECT UPCOMING RESULT</button>
        <div style="text-align: center; font-size: 9px; color: #333; margin-top: 5px;">STABLE BRIDGE: ACTIVE | BYPASS: V4.0.1</div>
    </div>

<script>
    // Server Synchronization Logic (Website ၏ ID များကို အချိန်နှင့်ညှိခြင်း)
    function syncID() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();

        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        // CK Lottery 1-Minute Algorithm (Screenshot ပါ ID ပုံစံအတိုင်း)
        const totalMinutes = (now.getHours() * 60) + now.getMinutes();
        const basePeriod = `${year}${month}${day}1000${1000 + totalMinutes}`;
        const targetPeriod = `${year}${month}${day}1000${1001 + totalMinutes}`;

        document.getElementById('currID').innerText = basePeriod;
        document.getElementById('nextID').innerText = targetPeriod;
    }

    // Result Prediction Injection
    function runInjection() {
        const display = document.getElementById('injectResult');
        display.innerText = "READING";
        display.className = "res-val loading";

        // Server API data interception simulation
        setTimeout(() => {
            const results = ["BIG", "SMALL"];
            const prediction = results[Math.floor(Math.random() * results.length)];
            
            display.innerText = prediction;
            display.className = "res-val " + prediction.toLowerCase();
            
            console.log(`[SYNC SUCCESS] Period: ${document.getElementById('nextID').innerText} Result: ${prediction}`);
        }, 1800);
    }

    // စက္ကန့်မလပ် Sync လုပ်ခြင်း
    setInterval(syncID, 1000);
    syncID();
</script>

</body>
</html>
