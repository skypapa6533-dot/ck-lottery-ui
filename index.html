<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK HACK AUTO-SERVER V3</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-green: #00ff88;
            --neon-red: #ff3366;
            --bg-dark: #0d1117;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        .header { background: #111; padding: 10px; text-align: center; border-bottom: 1px solid var(--neon-blue); }
        .header h2 { color: var(--neon-blue); font-size: 18px; text-shadow: 0 0 10px var(--neon-blue); }

        /* Top Server Frame Section (Auto Open) */
        .server-container { flex: 1.5; position: relative; background: #000; }
        .server-iframe { width: 100%; height: 100%; border: none; }

        /* Bottom Predictor Section */
        .predictor-container { 
            flex: 1; background: #161b22; border-top: 2px solid var(--neon-blue); 
            padding: 15px; overflow-y: auto; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .hack-card { background: #0d1117; border: 1px solid #333; border-radius: 10px; padding: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .digit-input { 
            flex: 1; background: #000; border: 1px solid var(--neon-blue); 
            color: #fff; padding: 12px; text-align: center; border-radius: 5px; outline: none;
        }

        .analyze-btn { 
            width: 100%; background: var(--neon-blue); border: none; padding: 12px; 
            font-weight: bold; border-radius: 5px; cursor: pointer; color: #000; text-transform: uppercase;
        }

        .result-box { 
            margin-top: 15px; height: 80px; border: 1px dashed var(--neon-blue); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px;
        }
        .res-text { font-size: 35px; font-weight: 900; letter-spacing: 3px; }
        
        .color-waiting { color: #444; }
        .color-small { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
        .color-big { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }

        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: 0.5s;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>CK HACK SERVER V3 (LIVE)</h2>
    </div>

    <div class="server-container">
        <div id="loader" class="loading-overlay">SERVER CONNECTING...</div>
        <iframe 
            id="ck-frame"
            src="https://www.cklottery.tv/#/home/AllLotteryGames/WinGo?id=1" 
            class="server-iframe"
            onload="document.getElementById('loader').style.display='none';">
        </iframe>
    </div>

    <div class="predictor-container">
        <div class="hack-card">
            <p style="font-size: 11px; color: var(--neon-blue); margin-bottom: 10px; text-align: center;">WIN GO 1MIN NEXT RESULT HACK</p>
            <div class="input-group">
                <input type="number" id="n1" class="digit-input" placeholder="Last Digit 1">
                <input type="number" id="n2" class="digit-input" placeholder="Last Digit 2">
            </div>
            <button class="analyze-btn" onclick="runHack()">ANALYZE NEXT RESULT</button>
            
            <div class="result-box">
                <span style="font-size: 10px; color: #8b949e;">PREDICTION</span>
                <div id="hack-res" class="res-text color-waiting">READY</div>
            </div>
        </div>
    </div>

<script>
    function runHack() {
        let v1 = document.getElementById('n1').value;
        let v2 = document.getElementById('n2').value;
        let res = document.getElementById('hack-res');

        if(v1 === "" || v2 === "") {
            alert("ဂဏန်းများအရင်ဖြည့်ပါ");
            return;
        }

        res.innerText = "HACKING...";
        res.className = "res-text color-waiting";

        setTimeout(() => {
            // Logic based on inputs
            let total = parseInt(v1) + parseInt(v2);
            let prediction = (total >= 8) ? "BIG" : "SMALL";
            
            // Random override for extra realism
            if(Math.random() > 0.8) prediction = (prediction === "BIG") ? "SMALL" : "BIG";

            res.innerText = prediction;
            res.className = "res-text " + (prediction === "BIG" ? "color-big" : "color-small");
        }, 1200);
    }

    // Auto Refresh Check (Optional: Refresh server every 5 mins)
    setInterval(() => {
        // document.getElementById('ck-frame').src = document.getElementById('ck-frame').src;
    }, 300000);
</script>

</body>
</html>
