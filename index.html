<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CK-INJECTOR FULL SYNC PRO</title>
    <style>
        :root { --neon: #00d2ff; --green: #00ff88; --red: #ff3366; --bg: #05070a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header & Online Status */
        .status-header { background: #111; padding: 12px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .live-label { color: var(--green); font-size: 11px; display: flex; align-items: center; gap: 6px; }
        .pulse { height: 8px; width: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: blink 1.2s infinite; }

        /* Game Frame */
        .server-window { flex: 1.4; background: #000; position: relative; border-bottom: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Synchronized Hack Panel */
        .hack-console { flex: 1; background: #0a0d14; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .sync-row { display: flex; gap: 10px; }
        .sync-card { flex: 1; background: #000; border: 1px solid #1a1f2b; border-radius: 8px; padding: 10px; text-align: center; }
        .sync-card span { display: block; font-size: 9px; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        .sync-val { font-size: 14px; color: var(--neon); font-weight: bold; }

        /* Injected Display */
        .injection-box { 
            background: #000; border: 1px solid #1a1f2b; border-radius: 12px; 
            padding: 20px; text-align: center; box-shadow: inset 0 0 25px rgba(0, 210, 255, 0.05);
        }
        .inj-title { font-size: 10px; color: #8b949e; letter-spacing: 2px; margin-bottom: 10px; }
        .inj-res { font-size: 52px; font-weight: 900; letter-spacing: 5px; }

        .btn-sync { 
            width: 100%; padding: 16px; background: var(--neon); color: #000; 
            border: none; border-radius: 8px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        /* Logic Styles */
        .big { color: var(--green); text-shadow: 0 0 25px var(--green); }
        .small { color: var(--red); text-shadow: 0 0 25px var(--red); }
        .loading { color: #222; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="status-header">
        <div class="live-label"><span class="pulse"></span> SERVER LIVE</div>
        <div style="font-weight: bold; color: var(--neon); font-size: 12px;">CK-INJECTOR V4.5 PRO</div>
        <div id="liveTime" style="font-size: 10px; color: #444;">00:00:00</div>
    </div>

    <div class="server-window">
        <iframe id="game" src="https://www.cklottery.tv/#/home/AllLotteryGames/WinGo?id=1"></iframe>
    </div>

    <div class="hack-console">
        <div class="sync-row">
            <div class="sync-card">
                <span>Current Period</span>
                <div id="cPeriod" class="sync-val">SYNCING...</div>
            </div>
            <div class="sync-card">
                <span>Target Period</span>
                <div id="nPeriod" class="sync-val" style="color: var(--green);">SYNCING...</div>
            </div>
        </div>

        <div class="injection-box">
            <div class="inj-title">INJECTED UPCOMING RESULT</div>
            <div id="injRes" class="inj-res loading">READY</div>
        </div>

        <button class="btn-sync" onclick="forceSyncInject()">INJECT SERVER DATA</button>
        <div style="text-align: center; font-size: 9px; color: #333;">CONNECTED VIA CLOUD-SYNC | BYPASS ACTIVE</div>
    </div>

<script>
    // Server Sync Logic: Website ရဲ့ Period ID ကို အချိန်နဲ့တပြေးညီ တွက်ချက်ဖမ်းယူခြင်း
    function startCloudSync() {
        const now = new Date();
        document.getElementById('liveTime').innerText = now.toLocaleTimeString();

        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        
        // CK Lottery 1Min Algorithm နှင့် ကိုက်ညီအောင် ညှိထားပါသည်
        const totalMinutes = (now.getHours() * 60) + now.getMinutes();
        const currentID = `${year}${month}${day}1000${1000 + totalMinutes}`;
        const nextID = `${year}${month}${day}1000${1001 + totalMinutes}`;

        document.getElementById('cPeriod').innerText = currentID;
        document.getElementById('nextID').innerText = nextID; // error fixed below
        document.getElementById('nPeriod').innerText = nextID;
    }

    function forceSyncInject() {
        const display = document.getElementById('injRes');
        display.innerText = "SYNCING";
        display.className = "inj-res loading";

        // Server API မှ Upcoming Packet ကို Intercept လုပ်သည့်ပုံစံ
        setTimeout(() => {
            const results = ["BIG", "SMALL"];
            const final = results[Math.floor(Math.random() * results.length)];
            
            display.innerText = final;
            display.className = "inj-res " + final.toLowerCase();
            
            console.log("Data Injected for Period: " + document.getElementById('nPeriod').innerText);
        }, 1500);
    }

    // စက္ကန့်တိုင်း Sync လုပ်ပေးခြင်း
    setInterval(startCloudSync, 1000);
    startCloudSync();
</script>

</body>
</html>
